<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habit Rings — Notes</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      /* ══════════════════════════════════════════
         SOFT NOTES — Refined Pastels, No Shadows
         ══════════════════════════════════════════ */

      html, body { height: 100%; }

      .app-shell {
        max-width: 100%;
        padding-inline: 32px;
      }

      /* ── Soft Palette ── */
      :root {
        /* Card backgrounds — muted pastels */
        --c-sand:      #E8D9C5;
        --c-sand-bar:  #C9B89A;
        --c-sand-txt:  #2E2318;

        --c-sage:      #C8DBC9;
        --c-sage-bar:  #96C09A;
        --c-sage-txt:  #1A2E1C;

        --c-sky:       #BFCFE0;
        --c-sky-bar:   #7AAACF;
        --c-sky-txt:   #0E2035;

        --c-rose:      #E8CDD6;
        --c-rose-bar:  #C898AA;
        --c-rose-txt:  #350D1C;

        --c-mist:      #CECDDF;
        --c-mist-bar:  #9E9CC5;
        --c-mist-txt:  #1C183A;

        --note-radius: 18px;
        --note-border: 1.5px solid rgba(0,0,0,0.10);
      }

      /* ── Page Header meta ── */
      .notes-top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 6px;
      }

      /* ── Stylish wordmark ── */
      .notes-wordmark {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .wordmark-logo {
        width: 42px;
        height: 42px;
        flex-shrink: 0;
      }

      .wordmark-text {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .wordmark-title {
        font-family: 'Lexend', sans-serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.025em;
        color: var(--text);
        line-height: 1;
      }

      /* ── New Note Button ── */
      .btn-new-note {
        font-family: 'Lexend', sans-serif;
        font-weight: 500;
        font-size: 13.5px;
        padding: 9px 22px;
        border-radius: 12px;
        border: 1.5px solid var(--border-strong);
        background: var(--bg-raised);
        color: var(--text);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn-new-note:hover {
        background: var(--bg-hover);
        border-color: var(--accent-border);
      }
      .btn-new-note svg {
        width: 16px; height: 16px;
        stroke: var(--accent);
        stroke-width: 2;
      }

      /* ── Stats bar ── */
      .notes-stats-bar {
        display: flex;
        gap: 20px;
        margin-top: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .notes-stat {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .notes-stat-value {
        font-family: 'Lexend', sans-serif;
        font-size: 17px;
        font-weight: 600;
        color: var(--text);
      }

      /* ── Search ── */
      .notes-search-wrap {
        margin-top: 16px;
        position: relative;
      }
      .notes-search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: var(--text-dim);
      }
      .notes-search-icon svg {
        width: 16px; height: 16px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }
      .notes-search {
        width: 100%;
        padding: 11px 16px 11px 42px;
        border-radius: 12px;
        border: 1.5px solid var(--border);
        background: var(--bg-raised);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 13.5px;
        transition: border-color 0.18s;
      }
      .notes-search:focus {
        outline: none;
        border-color: var(--accent-border);
      }
      .notes-search::placeholder { color: var(--text-dim); }

      /* ── Filter chips ── */
      .notes-filter-bar {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .filter-chip {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 500;
        padding: 5px 13px;
        border-radius: 999px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        transition: background 0.13s, border-color 0.13s, color 0.13s;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .filter-chip:hover { background: var(--bg-raised); color: var(--text); }
      .filter-chip.active {
        background: var(--accent-soft);
        border-color: var(--accent-border);
        color: var(--accent);
      }
      .filter-dot {
        width: 9px; height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* ── Notes Grid ── */
      .notes-masonry {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(250px, 100%), 1fr));
        gap: 16px;
        align-items: start;
        padding-bottom: 60px;
      }
      @media (max-width: 600px)  { .notes-masonry { grid-template-columns: 1fr; gap: 10px; } }

      /* ── Note Card ── */
      .note-card {
        border-radius: var(--note-radius);
        border: var(--note-border);
        overflow: hidden;
        cursor: grab;
        transition: transform 0.22s cubic-bezier(0.34, 1.3, 0.64, 1),
                    border-color 0.18s,
                    box-shadow 0.18s ease;
        animation: noteIn 0.3s ease both;
        position: relative;
        touch-action: auto;
      }
      @media (pointer: coarse) {
        .note-card { cursor: default; touch-action: auto; }
      }
      @keyframes noteIn {
        from { opacity: 0; transform: translateY(10px) scale(0.98); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Top accent bar */
      .note-card-bar {
        height: 4px;
        width: 100%;
      }

      .note-card:hover {
        transform: translateY(-3px);
        border-color: rgba(0,0,0,0.18);
      }
      .note-card.dragging {
        opacity: 0.96;
        cursor: grabbing;
        box-shadow: 0 14px 32px rgba(0,0,0,0.2);
        transform: rotate(1.2deg);
        z-index: 20;
      }
      .note-card-placeholder {
        border-radius: var(--note-radius);
        border: 1.5px dashed rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.04);
      }

      /* Pinned ring */
      .note-card.pinned {
        border-width: 2px;
        border-color: var(--note-pin-color, rgba(100,100,200,0.4));
      }

      .note-card-body { padding: 16px 18px 10px; }

      .note-card-title {
        font-family: 'Lexend', sans-serif;
        font-size: 15px;
        font-weight: 600;
        margin: 0 0 7px;
        line-height: 1.35;
        word-break: break-word;
      }

      .note-card-content {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        line-height: 1.65;
        word-break: break-word;
        white-space: pre-wrap;
      }

      /* Checklist on card */
      .note-checklist {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .note-checklist-item {
        display: flex;
        align-items: center;
        gap: 9px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        line-height: 1.5;
      }
      .note-checklist-item input[type="checkbox"] {
        width: 16px; height: 16px;
        border-radius: 5px;
        appearance: none;
        -webkit-appearance: none;
        border: 1.5px solid currentColor;
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
        opacity: 0.5;
        transition: all 0.14s;
        position: relative;
      }
      .note-checklist-item input[type="checkbox"]:checked {
        opacity: 0.9;
        background: currentColor;
      }
      .note-checklist-item input[type="checkbox"]:checked::after {
        content: '';
        position: absolute;
        top: 2px; left: 4px;
        width: 5px; height: 8px;
        border: 2px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }
      .note-checklist-item.checked span { opacity: 0.45; text-decoration: line-through; }

      /* Card footer */
      .note-card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 14px 13px;
        gap: 4px;
      }
      .note-card-date {
        font-family: 'Inter', sans-serif;
        font-size: 10.5px;
        font-weight: 500;
        opacity: 0.38;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .note-card-actions {
        display: flex;
        gap: 1px;
        opacity: 0;
        transition: opacity 0.14s;
      }
      .note-card:hover .note-card-actions { opacity: 1; }
      .note-action-btn {
        width: 27px; height: 27px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.55;
        transition: background 0.12s, opacity 0.12s;
      }
      .note-action-btn svg {
        width: 14px; height: 14px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }
      .note-action-btn:hover { background: rgba(0,0,0,0.09); opacity: 1; }
      .note-action-btn.active { opacity: 1; }

      /* ── Empty state ── */
      .notes-empty-state {
        text-align: center;
        padding: 80px 20px;
        animation: noteIn 0.4s ease both;
        grid-column: 1 / -1;
      }
      .notes-empty-icon {
        width: 64px; height: 64px;
        margin: 0 auto 18px;
        opacity: 0.18;
      }
      .notes-empty-state h3 {
        font-family: 'Lexend', sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px;
      }
      .notes-empty-state p {
        font-family: 'Inter', sans-serif;
        font-size: 13.5px;
        color: var(--text-muted);
        max-width: 320px;
        margin: 0 auto;
        line-height: 1.6;
      }

      /* ══════════════════════════════════════════
         EDITOR OVERLAY
         ══════════════════════════════════════════ */
      .note-editor-overlay {
        position: fixed;
        inset: 0;
        background: rgba(8, 10, 8, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      .note-editor-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      .note-editor-panel {
        width: min(540px, calc(100vw - 48px));
        max-height: 88vh;
        border-radius: 22px;
        border: 1.5px solid rgba(0,0,0,0.12);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transform: translateY(18px) scale(0.97);
        transition: transform 0.28s cubic-bezier(0.34, 1.4, 0.64, 1),
                    background-color 0.18s ease;
      }
      .note-editor-overlay.open .note-editor-panel {
        transform: translateY(0) scale(1);
      }

      .note-editor-bar {
        height: 4px;
        width: 100%;
        flex-shrink: 0;
      }

      .note-editor-body {
        padding: 20px 24px 12px;
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      /* ── Formatting toolbar inside editor ── */
      .note-format-toolbar {
        display: flex;
        gap: 2px;
        padding: 6px 0;
        border-bottom: 1px solid rgba(0,0,0,0.09);
        margin-bottom: 4px;
        flex-wrap: wrap;
      }
      .fmt-btn {
        width: 30px; height: 30px;
        border-radius: 7px;
        border: none;
        background: transparent;
        color: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        opacity: 0.5;
        transition: background 0.12s, opacity 0.12s;
      }
      .fmt-btn:hover { background: rgba(0,0,0,0.08); opacity: 0.9; }
      .fmt-btn.active { background: rgba(0,0,0,0.1); opacity: 1; }
      .fmt-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.2; fill: none; }
      .fmt-sep {
        width: 1px;
        height: 22px;
        background: rgba(0,0,0,0.1);
        margin: 4px 4px;
        align-self: center;
        flex-shrink: 0;
      }

      .note-editor-title {
        font-family: 'Lexend', sans-serif;
        font-size: 19px;
        font-weight: 600;
        border: none;
        background: transparent;
        color: inherit;
        width: 100%;
        outline: none;
        padding: 0;
        letter-spacing: -0.01em;
      }
      .note-editor-title::placeholder { opacity: 0.28; color: inherit; }

      /* contenteditable editor area */
      .note-editor-content {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        line-height: 1.7;
        border: none;
        background: transparent;
        color: inherit;
        width: 100%;
        outline: none;
        min-height: 110px;
        word-break: break-word;
      }
      .note-editor-content:empty::before {
        content: attr(data-placeholder);
        opacity: 0.28;
        pointer-events: none;
        color: inherit;
      }
      .note-editor-content b, .note-editor-content strong {
        font-weight: 700;
      }
      .note-editor-content i, .note-editor-content em {
        font-style: italic;
      }
      .note-editor-content u {
        text-decoration: underline;
      }

      /* checklist editor */
      .note-editor-checklist {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .note-editor-checklist-item {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .note-editor-checklist-item input[type="checkbox"] {
        width: 16px; height: 16px;
        border-radius: 5px;
        appearance: none;
        -webkit-appearance: none;
        border: 1.5px solid currentColor;
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
        opacity: 0.4;
        transition: all 0.14s;
      }
      .note-editor-checklist-item input[type="checkbox"]:checked {
        opacity: 0.9; background: currentColor;
      }
      .note-editor-checklist-item input[type="text"] {
        flex: 1;
        border: none;
        background: transparent;
        color: inherit;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        outline: none;
        padding: 6px 0;
        border-bottom: 1px solid transparent;
        transition: border-color 0.14s;
      }
      .note-editor-checklist-item input[type="text"]:focus {
        border-bottom-color: rgba(0,0,0,0.15);
      }
      .remove-checklist-item {
        width: 22px; height: 22px;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.12s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .note-editor-checklist-item:hover .remove-checklist-item { opacity: 0.4; }
      .remove-checklist-item:hover { opacity: 0.9 !important; }

      .add-checklist-item-btn {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 7px 0;
        border: none;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        opacity: 0.35;
        transition: opacity 0.14s;
        margin-top: 2px;
      }
      .add-checklist-item-btn:hover { opacity: 0.65; }

      /* ── Editor Footer ── */
      .note-editor-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 18px 16px;
        gap: 8px;
        flex-wrap: wrap;
        border-top: 1px solid rgba(0,0,0,0.07);
      }

      .color-wash-row {
        display: flex;
        gap: 7px;
        align-items: center;
      }
      .color-swatch {
        width: 24px; height: 24px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        transition: transform 0.14s, border-color 0.14s;
        outline: none;
      }
      .color-swatch:hover { transform: scale(1.18); }
      .color-swatch.selected {
        border-color: rgba(0,0,0,0.4);
        transform: scale(1.1);
      }

      .editor-right-actions {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .editor-icon-btn {
        width: 32px; height: 32px;
        border-radius: 9px;
        border: none;
        background: transparent;
        color: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.4;
        transition: background 0.12s, opacity 0.12s;
      }
      .editor-icon-btn svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2; fill: none; }
      .editor-icon-btn:hover { background: rgba(0,0,0,0.08); opacity: 0.85; }
      .editor-icon-btn.active { opacity: 1; background: rgba(0,0,0,0.08); }

      .editor-mode-btn {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 500;
        padding: 6px 13px;
        border-radius: 8px;
        border: 1.5px solid rgba(0,0,0,0.15);
        background: transparent;
        color: inherit;
        cursor: pointer;
        opacity: 0.55;
        transition: all 0.13s;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .editor-mode-btn svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; }
      .editor-mode-btn:hover { opacity: 0.85; background: rgba(0,0,0,0.06); }
      .editor-mode-btn.active { opacity: 1; background: rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.25); }

      .editor-save-btn {
        font-family: 'Lexend', sans-serif;
        font-weight: 600;
        font-size: 13px;
        padding: 8px 22px;
        border-radius: 10px;
        border: 1.5px solid rgba(0,0,0,0.15);
        background: rgba(0,0,0,0.08);
        color: inherit;
        cursor: pointer;
        transition: background 0.13s, border-color 0.13s;
      }
      .editor-save-btn:hover { background: rgba(0,0,0,0.14); border-color: rgba(0,0,0,0.25); }

      /* ── Mobile ── */
      @media (max-width: 600px) {
        .app-shell { padding-inline: 10px; }
        .notes-top-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
        .btn-new-note { width: 100%; justify-content: center; }
        .notes-stats-bar { gap: 10px; flex-wrap: wrap; }
        .notes-search { font-size: 13px; padding: 9px 14px 9px 38px; }
        .notes-filter-bar { gap: 4px; }
        .filter-chip { font-size: 11px; padding: 4px 10px; }
        .note-editor-overlay { align-items: flex-end; padding: 0; }
        .note-editor-panel {
          width: 100% !important;
          max-height: 92dvh;
          border-radius: 20px 20px 0 0 !important;
        }
        .note-editor-body { padding: 16px 14px 8px; }
        .note-editor-footer { padding: 8px 14px 20px; flex-wrap: wrap; gap: 8px; }
        .color-wash-row { gap: 5px; }
        .color-swatch { width: 22px; height: 22px; }
        .editor-save-btn { flex: 1; text-align: center; justify-content: center; }
        .note-format-toolbar { gap: 1px; padding: 4px 0; }
        .fmt-btn { width: 28px; height: 28px; }
        .note-card-body { padding: 12px 14px 8px; }
        .note-card-title { font-size: 14px; }
        .note-card-content { font-size: 12px; }
      }

    </style>
  </head>
  <body class="notes-page">
    <div class="app-shell">

      <!-- ── App Header ── -->
      <header class="app-header glass">
        <div class="header-primary">
          <div class="brand">
            <span class="brand-dot"></span>
            <span class="brand-name">Habit Rings</span>
          </div>
          <nav class="header-nav">
            <a href="index.html" class="chip chip-outline">Dashboard</a>
            <a href="notes.html" class="chip chip-outline chip-active">Notes</a>
            <a href="calendar.html" class="chip chip-outline">Calendar</a>
            <a href="quotes.html" class="chip chip-outline">Books</a>
            <a href="technology.html" class="chip chip-outline">Technology</a>
          </nav>
          <div class="header-meta">
            <span id="today-label" class="today-label"></span>
          </div>
        </div>
      </header>

      <!-- ── Main ── -->
      <main id="notes-view">

        <!-- Top bar -->
        <div class="notes-top-bar">
          <div class="notes-wordmark">

            <!-- Stylish SVG logo -->
            <svg class="wordmark-logo" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect width="42" height="42" rx="13" fill="var(--accent-soft)"/>
              <!-- Ruled lines -->
              <line x1="11" y1="16" x2="31" y2="16" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/>
              <line x1="11" y1="21" x2="27" y2="21" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/>
              <line x1="11" y1="26" x2="23" y2="26" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/>
              <!-- Top-left fold corner -->

    <script src="script.js"></script>

    <script>
    (function () {
      'use strict';

      const STORAGE_KEY = 'habit-rings-vibe-notes';

      /* ── Palette ── */
      const PALETTE = {
        sand: { bg: '#E8D9C5', bar: '#C9B89A', txt: '#2E2318', pin: 'rgba(160,110,60,0.55)' },
        sage: { bg: '#C8DBC9', bar: '#96C09A', txt: '#1A2E1C', pin: 'rgba(60,140,75,0.5)'  },
        sky:  { bg: '#BFCFE0', bar: '#7AAACF', txt: '#0E2035', pin: 'rgba(50,120,200,0.5)' },
        rose: { bg: '#E8CDD6', bar: '#C898AA', txt: '#350D1C', pin: 'rgba(190,60,95,0.45)' },
        mist: { bg: '#CECDDF', bar: '#9E9CC5', txt: '#1C183A', pin: 'rgba(100,95,190,0.5)' },
      };

      /* ── State ── */
      let notes = load();
      let editingId = null;
      let currentFilter = 'all';
      let searchQ = '';
      let editorColor = 'sand';
      let editorPinned = false;
      let editorMode = 'prose'; // 'prose' | 'checklist'
      let dragSession = null;

      /* ── DOM ── */
      const masonry   = document.getElementById('notes-masonry');
      const overlay   = document.getElementById('note-editor-overlay');
      const panel     = document.getElementById('note-editor-panel');
      const edBar     = document.getElementById('note-editor-bar');
      const titleInp  = document.getElementById('editor-title');
      const contentEl = document.getElementById('editor-content');
      const clWrap    = document.getElementById('editor-checklist-wrap');
      const clUl      = document.getElementById('editor-checklist');
      const addItemB  = document.getElementById('add-checklist-item');
      const colorRow  = document.getElementById('color-wash-row');
      const modeBtnEl = document.getElementById('editor-mode-toggle');
      const pinBtnEl  = document.getElementById('editor-pin-btn');
      const delBtnEl  = document.getElementById('editor-delete-btn');
      const saveBtnEl = document.getElementById('editor-save-btn');
      const searchEl  = document.getElementById('notes-search');
      const filterBar = document.getElementById('notes-filter-bar');
      const fmtTbr    = document.getElementById('note-format-toolbar');

      /* ── Persistence ── */
      function load() {
        try {
          const r = localStorage.getItem(STORAGE_KEY);
          return normalizeNotes(r ? JSON.parse(r) : []);
        } catch {
          return [];
        }
      }
      function persist() {
        notes = normalizeNotes(notes);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      }
      function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
      function normalizeNotes(raw) {
        if (!Array.isArray(raw)) return [];
        const baseTime = Date.now();
        return raw.map((note, index) => {
          const createdAt = Number(note?.createdAt) || (baseTime + index);
          const updatedAt = Number(note?.updatedAt) || createdAt;
          return {
            id: note?.id || uid(),
            title: typeof note?.title === 'string' ? note.title : '',
            content: typeof note?.content === 'string' ? note.content : '',
            checklist: Array.isArray(note?.checklist) ? note.checklist.map(item => ({
              text: typeof item?.text === 'string' ? item.text : '',
              done: !!item?.done
            })) : [],
            color: PALETTE[note?.color] ? note.color : 'sand',
            pinned: !!note?.pinned,
            mode: note?.mode === 'checklist' ? 'checklist' : 'prose',
            createdAt,
            updatedAt,
            order: Number.isFinite(note?.order) ? Number(note.order) : index
          };
        });
      }
      function compareNotes(a, b) {
        if (!!b.pinned !== !!a.pinned) return Number(b.pinned) - Number(a.pinned);
        if ((a.order ?? 0) !== (b.order ?? 0)) return (a.order ?? 0) - (b.order ?? 0);
        return (b.updatedAt || 0) - (a.updatedAt || 0);
      }
      function getSortedNotes() {
        return [...notes].sort(compareNotes);
      }
      function getFilteredNotes() {
        let list = getSortedNotes();
        if (currentFilter === 'pinned') list = list.filter(n => n.pinned);
        else if (PALETTE[currentFilter]) list = list.filter(n => n.color === currentFilter);
        if (searchQ) {
          const q = searchQ.toLowerCase();
          list = list.filter(n =>
            (n.title||'').toLowerCase().includes(q) ||
            stripHtml(n.content || '').toLowerCase().includes(q) ||
            (n.checklist||[]).some(i => i.text.toLowerCase().includes(q))
          );
        }
        return list;
      }
      function stripHtml(html) {
        const d = document.createElement('div');
        d.innerHTML = html;
        return d.textContent || '';
      }
      /* ── Render ── */
      function render() {
        masonry.innerHTML = '';
        const list = getFilteredNotes();

        if (!list.length) {
          masonry.innerHTML = `<div class="notes-empty-state">
            <svg class="notes-empty-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="10" y="8" width="44" height="48" rx="7" stroke="currentColor" stroke-width="2.5"/>
              <line x1="20" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="20" y1="32" x2="40" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="20" y1="40" x2="34" y2="40" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <h3>${searchQ || currentFilter !== 'all' ? 'No matching notes' : 'No notes yet'}</h3>
            <p>${searchQ || currentFilter !== 'all' ? 'Try a different filter or search.' : 'Tap "New Note" to capture your first thought.'}</p>
          </div>`;
          updateStats();
          return;
        }

        list.forEach((note, i) => {
          const p = PALETTE[note.color] || PALETTE.sand;
          const card = document.createElement('div');
          card.className = 'note-card' + (note.pinned?' pinned':'');
          card.dataset.id = note.id;
          card.style.cssText = `background:${p.bg};color:${p.txt};--note-pin-color:${p.pin};animation-delay:${i*0.035}s;`;
          // Only enable drag on non-touch devices
          card.draggable = !window.matchMedia('(pointer: coarse)').matches;

          /* top bar */
          const bar = document.createElement('div');
          bar.className = 'note-card-bar';
          bar.style.background = p.bar;

          /* body */
          let bodyInner = '';
          if (note.title) bodyInner += `<div class="note-card-title">${esc(note.title)}</div>`;
          if (note.mode === 'checklist' && note.checklist?.length) {
            bodyInner += '<ul class="note-checklist">';
            note.checklist.forEach((item, idx) => {
              bodyInner += `<li class="note-checklist-item${item.done?' checked':''}">
                <input type="checkbox" ${item.done?'checked':''} data-nid="${note.id}" data-idx="${idx}" />
                <span>${esc(item.text)}</span></li>`;
            });
            bodyInner += '</ul>';
          } else if (note.content) {
            bodyInner += `<div class="note-card-content">${note.content}</div>`;
          }

          const body = document.createElement('div');
          body.className = 'note-card-body';
          body.innerHTML = bodyInner;

          /* footer */
          const dateStr = new Date(note.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric'});
          const footer = document.createElement('div');
          footer.className = 'note-card-footer';
          footer.innerHTML = `
            <span class="note-card-date">${dateStr}</span>
            <div class="note-card-actions">
              <button class="note-action-btn${note.pinned?' active':''}" data-action="pin" data-id="${note.id}" title="Pin">
                <svg viewBox="0 0 16 16"><path d="M8 2v5l2 2 2-2V2H6l2 2zM8 9v5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <button class="note-action-btn" data-action="edit" data-id="${note.id}" title="Edit">
                <svg viewBox="0 0 16 16"><path d="M11 2l3 3-8 8H3v-3z" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <button class="note-action-btn" data-action="delete" data-id="${note.id}" title="Delete">
                <svg viewBox="0 0 16 16"><polyline points="3,5 13,5"/><path d="M6 5V3h4v2"/><rect x="4" y="5" width="8" height="9" rx="1.5"/></svg>
              </button>
            </div>`;

          card.appendChild(bar);
          card.appendChild(body);
          card.appendChild(footer);

          /* click body to edit */
          body.addEventListener('click', () => openEditor(note.id));

          masonry.appendChild(card);
        });

        /* checklist toggles on cards */
        masonry.querySelectorAll('.note-checklist-item input[type="checkbox"]').forEach(cb => {
          cb.addEventListener('change', e => {
            e.stopPropagation();
            const n = notes.find(x => x.id === cb.dataset.nid);
            if (n?.checklist[+cb.dataset.idx]) {
              n.checklist[+cb.dataset.idx].done = cb.checked;
              persist(); render();
            }
          });
        });

        /* action buttons */
        masonry.querySelectorAll('.note-action-btn').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            if (btn.dataset.action === 'pin')    togglePin(btn.dataset.id);
            if (btn.dataset.action === 'edit')   openEditor(btn.dataset.id);
            if (btn.dataset.action === 'delete') removeNote(btn.dataset.id);
          });
        });

        bindDragAndDrop();
        updateStats();
      }

      function updateStats() {
        document.getElementById('stat-total').textContent = notes.length;
        document.getElementById('stat-pinned').textContent = notes.filter(n=>n.pinned).length;
        document.getElementById('stat-checklists').textContent = notes.filter(n=>n.mode==='checklist').length;
      }

      function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function togglePin(id) {
        const n = notes.find(x=>x.id===id);
        if (n) { n.pinned = !n.pinned; persist(); render(); }
      }
      function removeNote(id) {
        notes = notes.filter(x=>x.id!==id);
        persist(); render();
      }

      function bindDragAndDrop() {
        // Disable all drag-to-reorder on touch/mobile devices
        const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
        const cards = masonry.querySelectorAll('.note-card');
        cards.forEach(card => {
          if (isTouchDevice) {
            // Remove draggable so cards don't accidentally trigger drag on mobile
            card.draggable = false;
            return;
          }
          card.addEventListener('dragstart', onNativeDragStart);
          card.addEventListener('dragover', onNativeDragOver);
          card.addEventListener('drop', onNativeDrop);
          card.addEventListener('dragend', endNativeDrag);
          card.addEventListener('pointerdown', onPointerDragStart);
        });
      }

      function getNoteById(id) {
        return notes.find(note => note.id === id);
      }

      function canReorderCard(card) {
        if (!card) return false;
        const note = getNoteById(card.dataset.id);
        if (!note) return false;
        if (currentFilter !== 'all' && currentFilter !== 'pinned') return false;
        if (searchQ) return false;
        return true;
      }

      function onNativeDragStart(event) {
        const card = event.currentTarget;
        if (!canReorderCard(card)) {
          event.preventDefault();
          return;
        }
        const note = getNoteById(card.dataset.id);
        dragSession = { id: card.dataset.id, pinned: !!note?.pinned, placeholder: null, source: card };
        card.classList.add('dragging');
        event.dataTransfer.effectAllowed = 'move';
        event.dataTransfer.setData('text/plain', card.dataset.id);
      }

      function onNativeDragOver(event) {
        if (!dragSession) return;
        const targetCard = event.currentTarget;
        if (!targetCard || targetCard.dataset.id === dragSession.id) return;
        const targetNote = getNoteById(targetCard.dataset.id);
        if (!targetNote || !!targetNote.pinned !== dragSession.pinned) return;
        event.preventDefault();
        const rect = targetCard.getBoundingClientRect();
        const before = event.clientY < rect.top + rect.height / 2;
        masonry.insertBefore(dragSession.source, before ? targetCard : targetCard.nextSibling);
      }

      function onNativeDrop(event) {
        event.preventDefault();
        finalizeReorder();
      }

      function endNativeDrag() {
        if (dragSession?.source) dragSession.source.classList.remove('dragging');
        finalizeReorder();
      }

      function onPointerDragStart(event) {
        if (event.pointerType === 'mouse') return;
        if (!canReorderCard(event.currentTarget)) return;
        if (event.target.closest('button, input, a')) return;

        const card = event.currentTarget;
        const note = getNoteById(card.dataset.id);
        dragSession = {
          id: card.dataset.id,
          pinned: !!note?.pinned,
          source: card,
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          dragging: false,
          placeholder: null
        };

        window.addEventListener('pointermove', onPointerDragMove);
        window.addEventListener('pointerup', onPointerDragEnd);
        window.addEventListener('pointercancel', onPointerDragEnd);
      }

      function onPointerDragMove(event) {
        if (!dragSession || event.pointerId !== dragSession.pointerId) return;
        const dx = event.clientX - dragSession.startX;
        const dy = event.clientY - dragSession.startY;

        if (!dragSession.dragging) {
          if (Math.hypot(dx, dy) < 10) return;
          beginPointerReorder(event);
        }

        event.preventDefault();
        const source = dragSession.source;
        source.style.left = `${event.clientX - dragSession.offsetX}px`;
        source.style.top = `${event.clientY - dragSession.offsetY}px`;

        const target = document.elementFromPoint(event.clientX, event.clientY)?.closest('.note-card');
        if (!target || target === source) return;
        const targetNote = getNoteById(target.dataset.id);
        if (!targetNote || !!targetNote.pinned !== dragSession.pinned) return;

        const rect = target.getBoundingClientRect();
        const before = event.clientY < rect.top + rect.height / 2;
        masonry.insertBefore(dragSession.placeholder, before ? target : target.nextSibling);
      }

      function beginPointerReorder(event) {
        const source = dragSession.source;
        const rect = source.getBoundingClientRect();
        const placeholder = document.createElement('div');
        placeholder.className = 'note-card-placeholder';
        placeholder.style.height = `${rect.height}px`;
        placeholder.style.width = `${rect.width}px`;

        dragSession.dragging = true;
        dragSession.placeholder = placeholder;
        dragSession.offsetX = event.clientX - rect.left;
        dragSession.offsetY = event.clientY - rect.top;

        masonry.insertBefore(placeholder, source.nextSibling);
        source.classList.add('dragging');
        source.style.width = `${rect.width}px`;
        source.style.position = 'fixed';
        source.style.left = `${rect.left}px`;
        source.style.top = `${rect.top}px`;
        source.style.zIndex = '1000';
        source.style.pointerEvents = 'none';
        document.body.appendChild(source);
      }

      function onPointerDragEnd(event) {
        if (!dragSession || event.pointerId !== dragSession.pointerId) return;
        window.removeEventListener('pointermove', onPointerDragMove);
        window.removeEventListener('pointerup', onPointerDragEnd);
        window.removeEventListener('pointercancel', onPointerDragEnd);

        if (!dragSession.dragging) {
          dragSession = null;
          return;
        }

        const { source, placeholder } = dragSession;
        source.classList.remove('dragging');
        source.removeAttribute('style');
        masonry.insertBefore(source, placeholder);
        placeholder.remove();
        finalizeReorder();
      }

      function finalizeReorder() {
        if (!dragSession) return;

        const { pinned, source } = dragSession;
        source.classList.remove('dragging');
        const visibleIds = [...masonry.querySelectorAll('.note-card')]
          .map(card => card.dataset.id)
          .filter(id => {
            const note = getNoteById(id);
            return note && !!note.pinned === pinned;
          });

        const hiddenIds = getSortedNotes()
          .filter(note => !!note.pinned === pinned && !visibleIds.includes(note.id))
          .map(note => note.id);

        [...visibleIds, ...hiddenIds].forEach((id, index) => {
          const note = getNoteById(id);
          if (note) note.order = index;
        });

        dragSession = null;
        persist();
        render();
      }

      /* ── Editor ── */
      function openEditor(id) {
        editingId = id || null;
        const note = id ? notes.find(n=>n.id===id) : null;

        titleInp.value = note?.title || '';
        contentEl.innerHTML = note?.content || '';
        editorColor = note?.color || 'sand';
        editorPinned = !!note?.pinned;
        editorMode = note?.mode || 'prose';

        applyEditorPalette();
        pinBtnEl.classList.toggle('active', editorPinned);
        delBtnEl.style.display = id ? '' : 'none';

        setMode(editorMode);

        /* populate checklist */
        clUl.innerHTML = '';
        if (note?.checklist?.length) {
          note.checklist.forEach(item => addClItem(item.text, item.done));
        }

        /* swatches */
        colorRow.querySelectorAll('.color-swatch').forEach(s =>
          s.classList.toggle('selected', s.dataset.color === editorColor)
        );

        overlay.classList.add('open');
        setTimeout(() => (id ? contentEl.focus() : titleInp.focus()), 250);
      }

      function closeEditor() {
        overlay.classList.remove('open');
        editingId = null;
      }

      function applyEditorPalette() {
        const p = PALETTE[editorColor] || PALETTE.sand;
        panel.style.background = p.bg;
        panel.style.color = p.txt;
        edBar.style.background = p.bar;
        saveBtnEl.style.background = `${p.bar}99`;
        saveBtnEl.style.borderColor = `${p.bar}`;
      }

      function setMode(mode) {
        editorMode = mode;
        if (mode === 'checklist') {
          contentEl.style.display = 'none';
          fmtTbr.style.display = 'none';
          clWrap.style.display = '';
          modeBtnEl.classList.add('active');
          /* migrate text → checklist items */
          const txt = contentEl.innerText.trim();
          if (txt && !clUl.children.length) {
            txt.split('\n').filter(l=>l.trim()).forEach(l => addClItem(l.trim(), false));
            contentEl.innerHTML = '';
          }
          if (!clUl.children.length) addClItem('', false);
        } else {
          contentEl.style.display = '';
          fmtTbr.style.display = '';
          clWrap.style.display = 'none';
          modeBtnEl.classList.remove('active');
        }
      }

      function addClItem(text, done) {
        const li = document.createElement('li');
        li.className = 'note-editor-checklist-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.checked = done;
        const inp = document.createElement('input');
        inp.type = 'text'; inp.value = text; inp.placeholder = 'List item…'; inp.spellcheck = false;
        const rm = document.createElement('button');
        rm.className = 'remove-checklist-item'; rm.textContent = '×';
        rm.addEventListener('click', () => li.remove());
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); addClItem('', false); clUl.querySelectorAll('input[type="text"]').at(-1).focus(); }
          if (e.key === 'Backspace' && !inp.value && clUl.children.length > 1) {
            e.preventDefault();
            const prev = li.previousElementSibling;
            li.remove();
            prev?.querySelector('input[type="text"]').focus();
          }
        });
        li.appendChild(cb); li.appendChild(inp); li.appendChild(rm);
        clUl.appendChild(li);
      }

      function saveNote() {
        const title = titleInp.value.trim();
        const content = editorMode === 'prose' ? contentEl.innerHTML.trim() : '';
        const checklist = editorMode === 'checklist'
          ? [...clUl.querySelectorAll('.note-editor-checklist-item')].map(li => ({
              text: li.querySelector('input[type="text"]').value.trim(),
              done: li.querySelector('input[type="checkbox"]').checked
            })).filter(i => i.text)
          : [];

        if (!title && !content && !checklist.length) { closeEditor(); return; }

        if (editingId) {
          const note = notes.find(n=>n.id===editingId);
          if (note) Object.assign(note, { title, content, checklist, color: editorColor, pinned: editorPinned, mode: editorMode, updatedAt: Date.now() });
        } else {
          const samePinned = notes.filter(note => !!note.pinned === editorPinned);
          const nextOrder = samePinned.length ? Math.max(...samePinned.map(note => note.order ?? 0)) + 1 : 0;
          notes.push({ id: uid(), title, content, checklist, color: editorColor, pinned: editorPinned, mode: editorMode, createdAt: Date.now(), updatedAt: Date.now(), order: nextOrder });
        }
        persist(); closeEditor(); render();
      }

      /* ── Formatting commands ── */
      function fmt(cmd, val) {
        contentEl.focus();
        document.execCommand(cmd, false, val || null);
      }

      document.getElementById('fmt-bold').addEventListener('mousedown', e => { e.preventDefault(); fmt('bold'); });
      document.getElementById('fmt-italic').addEventListener('mousedown', e => { e.preventDefault(); fmt('italic'); });
      document.getElementById('fmt-underline').addEventListener('mousedown', e => { e.preventDefault(); fmt('underline'); });
      document.getElementById('fmt-ul').addEventListener('mousedown', e => { e.preventDefault(); fmt('insertUnorderedList'); });
      document.getElementById('fmt-ol').addEventListener('mousedown', e => { e.preventDefault(); fmt('insertOrderedList'); });
      document.getElementById('fmt-clear').addEventListener('mousedown', e => { e.preventDefault(); fmt('removeFormat'); });

      /* keyboard shortcuts */
      contentEl.addEventListener('keydown', e => {
        if ((e.ctrlKey||e.metaKey) && e.key==='b') { e.preventDefault(); fmt('bold'); }
        if ((e.ctrlKey||e.metaKey) && e.key==='i') { e.preventDefault(); fmt('italic'); }
        if ((e.ctrlKey||e.metaKey) && e.key==='u') { e.preventDefault(); fmt('underline'); }
      });

      /* ── Bindings ── */
      document.getElementById('btn-new-note').addEventListener('click', () => openEditor(null));
      saveBtnEl.addEventListener('click', saveNote);

      delBtnEl.addEventListener('click', () => {
        if (editingId) { removeNote(editingId); closeEditor(); }
      });

      pinBtnEl.addEventListener('click', () => {
        editorPinned = !editorPinned;
        pinBtnEl.classList.toggle('active', editorPinned);
      });

      modeBtnEl.addEventListener('click', () => setMode(editorMode === 'prose' ? 'checklist' : 'prose'));

      addItemB.addEventListener('click', () => {
        addClItem('', false);
        clUl.querySelectorAll('input[type="text"]').at(-1).focus();
      });

      colorRow.addEventListener('click', e => {
        const s = e.target.closest('.color-swatch');
        if (!s) return;
        editorColor = s.dataset.color;
        colorRow.querySelectorAll('.color-swatch').forEach(x => x.classList.toggle('selected', x===s));
        applyEditorPalette();
      });

      /* close on backdrop or Escape */
      overlay.addEventListener('click', e => { if (e.target === overlay) saveNote(); });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && overlay.classList.contains('open')) saveNote();
      });

      searchEl.addEventListener('input', () => { searchQ = searchEl.value.trim(); render(); });

      filterBar.addEventListener('click', e => {
        const c = e.target.closest('.filter-chip');
        if (!c) return;
        currentFilter = c.dataset.filter;
        filterBar.querySelectorAll('.filter-chip').forEach(x => x.classList.toggle('active', x===c));
        render();
      });

      /* today label */
      const todayEl = document.getElementById('today-label');
      if (todayEl) {
        todayEl.textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      }

      render();
    })();
    </script>
  </body>
</html>
