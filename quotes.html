<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Rings — Quotes</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    .quotes-shell {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .quotes-hero {
      padding: 12px 18px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .quotes-hero__copy h1 {
      font-family: 'Lexend', sans-serif;
      font-size: 20px;
      letter-spacing: -0.01em;
      margin-top: 2px;
    }
    .tech-chip {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-muted);
      font-weight: 700;
    }
    .quotes-workspace {
      padding: 18px;
      border-radius: 16px;
      min-height: 75vh;
    }
    .quotes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .quote-card {
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .quote-card:hover {
      background: rgba(255, 255, 255, 0.035);
      border-color: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }
    .quote-text {
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--text);
      font-weight: 400;
      font-style: italic;
    }
    .quote-author {
      font-family: 'Inter', sans-serif;
      font-size: 10.5px;
      color: var(--text-dim);
      font-weight: 500;
      margin-top: 2px;
    }
    .quote-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .quote-card:hover .quote-actions {
      opacity: 1;
    }
    .quote-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 2px 0;
      font-size: 10.5px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      opacity: 0.6;
    }
    .quote-btn:hover {
      opacity: 1;
      color: var(--text);
    }
    .quote-btn--delete:hover {
      color: #ff6464;
    }

    .add-quote-form {
      grid-column: 1 / -1;
      background: rgba(255, 255, 255, 0.01);
      border: 1px dashed rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-header {
      font-family: 'Lexend', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .inputs-row {
      display: flex;
      gap: 8px;
    }
    .quote-input, .author-input {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
    }
    .quote-input {
      flex: 3;
      min-height: 38px;
      resize: none;
    }
    .author-input {
      flex: 1;
    }
    .submit-quote-btn {
      background: var(--text-muted);
      color: var(--bg);
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      align-self: flex-end;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .submit-quote-btn:hover {
      background: var(--text);
      transform: scale(1.02);
    }

    @media (max-width: 600px) {
      .inputs-row { flex-direction: column; }
      .quote-actions { opacity: 1; }
      .quotes-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app-shell quotes-shell">
    <header class="app-header glass">
      <div class="header-primary">
        <div class="brand">
          <span class="brand-dot"></span>
          <span class="brand-name">Habit Rings</span>
        </div>
        <nav class="header-nav">
          <a href="index.html" class="chip chip-outline">Dashboard</a>
          <a href="goals.html" class="chip chip-outline">Goals</a>
          <a href="notes.html" class="chip chip-outline">Notes</a>
          <a href="calendar.html" class="chip chip-outline">Calendar</a>
          <a href="books.html" class="chip chip-outline">Books</a>
          <a href="english.html" class="chip chip-outline">English</a>
          <a href="technology.html" class="chip chip-outline">Knowledge base</a>
          <a href="quotes.html" class="chip chip-outline chip-active">Quotes</a>
        </nav>
        <div class="header-meta">
          <span id="today-label" class="today-label"></span>
        </div>
      </div>
    </header>

    <section class="quotes-hero glass">
      <div class="quotes-hero__copy">
        <span class="tech-chip">Inspiration Library</span>
        <h1>Quotes & Wisdom</h1>
      </div>
    </section>

    <section class="quotes-workspace glass">
      <div class="add-quote-form">
        <div class="form-header">Add New Quote</div>
        <div class="inputs-row">
          <textarea id="new-quote-text" class="quote-input" placeholder="Enter quote text..."></textarea>
          <input id="new-quote-author" class="author-input" placeholder="Author (optional)" />
        </div>
        <button id="add-quote-btn" class="submit-quote-btn">Save Quote</button>
      </div>

      <div class="quotes-grid" id="quotes-grid">
        <!-- Quotes will be rendered here -->
      </div>
    </section>
  </div>

  <script>
    const QUOTES_STORAGE_KEY = 'habit-rings-custom-quotes';
    
    // Default quotes if none exist
    const DEFAULT_QUOTES = [
      { text: "The harder I work, the more luck I seem to have.", author: "Thomas Jefferson" },
      { text: "Action is the foundational key to all success.", author: "Pablo Picasso" },
      { text: "Motivation is what gets you started. Habit is what keeps you going.", author: "Jim Ryun" }
    ];

    let quotes = JSON.parse(localStorage.getItem(QUOTES_STORAGE_KEY)) || DEFAULT_QUOTES;

    function saveQuotes() {
      localStorage.setItem(QUOTES_STORAGE_KEY, JSON.stringify(quotes));
      renderQuotes();
    }

    function renderQuotes() {
      const grid = document.getElementById('quotes-grid');
      grid.innerHTML = '';

      quotes.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'quote-card';
        card.innerHTML = `
          <div class="quote-text">"${q.text}"</div>
          <div class="quote-author">— ${q.author || 'Unknown'}</div>
          <div class="quote-actions">
            <button class="quote-btn" onclick="editQuote(${idx})">Edit</button>
            <button class="quote-btn quote-btn--delete" onclick="deleteQuote(${idx})">Delete</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    document.getElementById('add-quote-btn').addEventListener('click', () => {
      const text = document.getElementById('new-quote-text').value.trim();
      const author = document.getElementById('new-quote-author').value.trim();
      if (!text) return;

      quotes.unshift({ text, author });
      saveQuotes();
      
      document.getElementById('new-quote-text').value = '';
      document.getElementById('new-quote-author').value = '';
    });

    window.deleteQuote = (idx) => {
      if (!confirm('Delete this quote?')) return;
      quotes.splice(idx, 1);
      saveQuotes();
    };

    window.editQuote = (idx) => {
      const q = quotes[idx];
      const newText = prompt('Edit quote:', q.text);
      if (newText === null) return;
      const newAuthor = prompt('Edit author:', q.author);
      quotes[idx] = { text: newText, author: newAuthor };
      saveQuotes();
    };

    // Today Date
    const todayEl = document.getElementById('today-label');
    if (todayEl) {
      todayEl.textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric'
      });
    }

    renderQuotes();
  </script>
</body>
</html>
