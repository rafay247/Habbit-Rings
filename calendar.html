<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habit Rings — Calendar</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      html, body { height: 100%; }

      .calendar-shell {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .calendar-hero {
        padding: 22px;
        border-radius: 24px;
      }

      .calendar-hero__top {
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        gap: 18px;
        flex-wrap: wrap;
      }

      .calendar-hero__copy {
        flex: 1 1 420px;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .calendar-hero__stats {
        flex: 0 1 auto;
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 14px;
        align-items: stretch;
      }

      .calendar-hero__eyebrow {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent-muted);
      }

      .calendar-hero h1 {
        margin-top: 8px;
        font-family: 'Lexend', sans-serif;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .calendar-hero p {
        margin-top: 10px;
        max-width: 640px;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        line-height: 1.7;
        color: var(--text-muted);
      }

      .calendar-status {
        min-width: 0;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(63, 185, 80, 0.08);
        border: 1px solid rgba(63, 185, 80, 0.18);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .calendar-status__label {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-dim);
      }

      .calendar-status__value {
        margin-top: 8px;
        font-family: 'Lexend', sans-serif;
        font-size: 22px;
      }

      .calendar-status__list {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .calendar-status__empty {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.6;
        color: var(--text-muted);
      }

      .calendar-status__event {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(63, 185, 80, 0.16);
        background: rgba(20, 26, 20, 0.72);
      }

      .calendar-status__event-title {
        font-family: 'Lexend', sans-serif;
        font-size: 13px;
        color: var(--text);
      }

      .calendar-status__event-note {
        margin-top: 4px;
        font-size: 12px;
        line-height: 1.55;
        color: var(--text-muted);
        white-space: pre-wrap;
      }

      .calendar-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        padding: 16px 18px;
        border-radius: 20px;
      }

      .calendar-toolbar__group {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .calendar-btn {
        border: 1px solid var(--border);
        background: var(--bg-raised);
        color: var(--text);
        border-radius: 12px;
        padding: 9px 14px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.15s;
      }

      .calendar-btn:hover {
        background: var(--bg-hover);
        border-color: var(--accent-border);
        transform: translateY(-1px);
      }

      .calendar-btn.is-active {
        background: rgba(63, 185, 80, 0.15);
        border-color: rgba(63, 185, 80, 0.32);
      }

      .calendar-year {
        min-width: 88px;
        text-align: center;
        font-family: 'Lexend', sans-serif;
        font-size: 24px;
      }

      .calendar-selection {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        color: var(--text-muted);
      }

      .calendar-event-panel {
        padding: 18px;
        border-radius: 20px;
      }

      .calendar-event-panel__top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }

      .calendar-event-panel__title {
        font-family: 'Lexend', sans-serif;
        font-size: 20px;
      }


      .calendar-event-form {
        margin-top: 16px;
        display: grid;
        gap: 10px;
      }

      .calendar-event-form__row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 132px 132px;
        gap: 10px;
        align-items: stretch;
      }

      .calendar-input,
      .calendar-textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-raised);
        color: var(--text);
        padding: 11px 13px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
      }

      .calendar-textarea {
        min-height: 120px;
        resize: vertical;
        line-height: 1.6;
      }

      .calendar-input:focus,
      .calendar-textarea:focus {
        outline: none;
        border-color: var(--accent-border);
      }

      .calendar-event-hint {
        font-size: 12px;
        line-height: 1.6;
        color: var(--text-dim);
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .month-card {
        padding: 14px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(12, 16, 12, 0.72);
        transition: border-color 0.15s, transform 0.15s;
      }

      .month-card.current-month {
        background: linear-gradient(180deg, rgba(63, 185, 80, 0.18), rgba(63, 185, 80, 0.06));
        border-color: rgba(63, 185, 80, 0.36);
        box-shadow: inset 0 0 0 1px rgba(63, 185, 80, 0.12);
      }

      .month-card:hover {
        transform: translateY(-2px);
      }

      .month-card__name {
        font-family: 'Lexend', sans-serif;
        font-size: 14px;
      }

      .month-card__hint {
        margin-top: 4px;
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        color: var(--text-dim);
      }

      .month-weekdays,
      .month-days {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 4px;
      }

      .month-weekdays {
        margin-top: 12px;
      }

      .month-weekdays span {
        text-align: center;
        font-family: 'Inter', sans-serif;
        font-size: 10px;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .month-days {
        margin-top: 8px;
      }

      .day-pad,
      .day-btn {
        aspect-ratio: 1;
      }

      .day-btn {
        position: relative;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: var(--text-muted);
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        cursor: pointer;
        transition: background 0.14s, border-color 0.14s, color 0.14s, transform 0.14s;
      }

      .day-btn:hover {
        background: rgba(255,255,255,0.06);
        border-color: rgba(255,255,255,0.1);
        color: var(--text);
        transform: translateY(-1px);
      }

      .day-btn.today {
        border-color: rgba(255,255,255,0.26);
        color: #fff;
      }

      .day-btn.selected {
        color: #fff;
        border-color: rgba(255, 88, 88, 0.5);
        background: rgba(255, 88, 88, 0.14);
      }

      .day-btn.selected::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: 4px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ff5858;
        transform: translateX(-50%);
      }

      .day-btn.has-event:not(.selected)::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: 4px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        transform: translateX(-50%);
      }

      .day-btn.marked-x::before {
        content: 'X';
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #ff5858;
        font-family: 'Lexend', sans-serif;
        font-size: 16px;
        font-weight: 700;
        pointer-events: none;
      }

      .calendar-empty {
        padding: 26px 18px;
        border-radius: 20px;
        border: 1px dashed rgba(255,255,255,0.14);
        text-align: center;
        color: var(--text-muted);
        font-family: 'Inter', sans-serif;
        line-height: 1.7;
      }

      @media (max-width: 1180px) {
        .calendar-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 860px) {
        .calendar-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .calendar-hero__stats {
          grid-template-columns: 1fr;
          width: 100%;
        }

        .calendar-grid {
          grid-template-columns: 1fr;
        }

        .calendar-hero,
        .calendar-toolbar,
        .calendar-event-panel {
          padding: 16px;
        }

        .calendar-event-form__row {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        .calendar-shell { gap: 10px; }
        .calendar-hero { padding: 12px; }
        .calendar-hero h1 { font-size: 26px; }
        .calendar-hero__eyebrow { font-size: 10px; }
        .calendar-toolbar { padding: 10px 12px; gap: 8px; }
        .calendar-toolbar__group { width: 100%; justify-content: space-between; }
        .calendar-btn { flex: 1; text-align: center; font-size: 11px; padding: 7px 8px; }
        .calendar-year { font-size: 18px; min-width: 60px; }
        .calendar-event-panel { padding: 12px; }
        .calendar-event-panel__title { font-size: 16px; }
        .calendar-input, .calendar-textarea { padding: 9px 11px; font-size: 12px; }
        .calendar-textarea { min-height: 70px; }
        .calendar-grid { gap: 8px; }
        .month-card { padding: 8px; border-radius: 14px; }
        .month-card__name { font-size: 12px; }
        .month-card__hint { font-size: 10px; }
        .month-weekdays { margin-top: 8px; gap: 2px; }
        .month-days { gap: 2px; margin-top: 6px; }
        .month-weekdays span { font-size: 8px; }
        .day-btn { font-size: 9px; border-radius: 6px; }
        .day-btn.selected::after,
        .day-btn.has-event:not(.selected)::after { width: 4px; height: 4px; bottom: 2px; }
        .calendar-status { padding: 10px 12px; border-radius: 14px; }
        .calendar-status__value { font-size: 18px; }
        .calendar-selection { font-size: 11px; }
      }
    </style>
  </head>
  <body>
    <div class="app-shell calendar-shell">
      <header class="app-header glass">
        <div class="header-primary">
          <div class="brand">
            <span class="brand-dot"></span>
            <span class="brand-name">Habit Rings</span>
          </div>
          <nav class="header-nav">
            <a href="index.html" class="chip chip-outline">Dashboard</a>
            <a href="notes.html" class="chip chip-outline">Notes</a>
            <a href="calendar.html" class="chip chip-outline chip-active">Calendar</a>
            <a href="quotes.html" class="chip chip-outline">Books</a>
            <a href="technology.html" class="chip chip-outline">Technology</a>
          </nav>
          <div class="header-meta">
            <span id="today-label" class="today-label"></span>
          </div>
        </div>
      </header>

      <section class="calendar-hero glass">
        <div class="calendar-hero__top">
          <div class="calendar-hero__copy">
            <div class="calendar-hero__eyebrow">Separate Planning View</div>
            <h1>Year Calendar</h1>
          </div>
          <div class="calendar-hero__stats">
            <div class="calendar-status">
              <div class="calendar-status__label">Selected Day</div>
              <div class="calendar-status__value" id="selected-day-label">None</div>
            </div>
            <div class="calendar-status">
              <div class="calendar-status__label">Today's Events</div>
              <div class="calendar-status__value" id="today-events-count">0</div>
              <div class="calendar-status__list" id="today-events-list"></div>
              <div class="calendar-status__empty" id="today-events-empty">No events for today.</div>
            </div>
          </div>
        </div>
      </section>

      <section class="calendar-toolbar glass">
        <div class="calendar-toolbar__group">
          <button class="calendar-btn" id="prev-year-btn" type="button">← Year</button>
          <div class="calendar-year" id="calendar-year-label">2026</div>
          <button class="calendar-btn" id="next-year-btn" type="button">Year →</button>
        </div>
        <div class="calendar-toolbar__group">
          <button class="calendar-btn" id="show-passed-btn" type="button">Show passed</button>
          <button class="calendar-btn" id="show-full-btn" type="button">Show full</button>
          <button class="calendar-btn" id="show-current-btn" type="button">Current month</button>
          <button class="calendar-btn" id="clear-selection-btn" type="button">Clear mark</button>
        </div>
        <div class="calendar-selection" id="calendar-selection-copy">Showing passed months only.</div>
      </section>

      <section class="calendar-event-panel glass">
        <div class="calendar-event-panel__top">
          <div>
            <div class="calendar-event-panel__title" id="event-panel-date-label">Add event for a date</div>
          </div>
        </div>
        <form class="calendar-event-form" id="calendar-event-form">
          <div class="calendar-event-form__row">
            <input
              id="calendar-event-title"
              class="calendar-input"
              type="text"
              maxlength="120"
              placeholder="Event title"
              autocomplete="off"
            />
            <button class="calendar-btn" id="save-event-btn" type="submit">Save event</button>
            <button class="calendar-btn" id="delete-event-btn" type="button">Delete event</button>
          </div>
          <textarea
            id="calendar-event-notes"
            class="calendar-textarea"
            maxlength="1000"
            placeholder="Add details, reminder text, agenda, or anything you want to see on that date..."
          ></textarea>
          <div class="calendar-event-hint" id="calendar-event-hint">Pick a date to start planning.</div>
        </form>
      </section>

      <main class="calendar-grid" id="calendar-grid"></main>
    </div>

    <script>
      (function () {
        'use strict';

        const STORAGE_KEY = 'habit-rings-calendar-selection-v1';
        const MARKS_KEY = 'habit-rings-calendar-x-marks-v1';
        const EVENTS_KEY = 'habit-rings-calendar-events-v1';
        const today = new Date();
        const realYear = today.getFullYear();
        const realMonth = today.getMonth();

        let year = realYear;
        let viewMode = 'passed';
        let selectedDate = loadSelection();
        let markedDates = loadMarkedDates();
        let eventsByDate = loadEvents();
        let pendingClickTimer = null;

        const yearLabel = document.getElementById('calendar-year-label');
        const grid = document.getElementById('calendar-grid');
        const selectionLabel = document.getElementById('selected-day-label');
        const selectionCopy = document.getElementById('calendar-selection-copy');
        const showPassedBtn = document.getElementById('show-passed-btn');
        const showFullBtn = document.getElementById('show-full-btn');
        const showCurrentBtn = document.getElementById('show-current-btn');
        const clearSelectionBtn = document.getElementById('clear-selection-btn');
        const todayEventsCountEl = document.getElementById('today-events-count');
        const todayEventsListEl = document.getElementById('today-events-list');
        const todayEventsEmptyEl = document.getElementById('today-events-empty');
        const eventPanelDateLabelEl = document.getElementById('event-panel-date-label');
        const eventFormEl = document.getElementById('calendar-event-form');
        const eventTitleEl = document.getElementById('calendar-event-title');
        const eventNotesEl = document.getElementById('calendar-event-notes');
        const eventHintEl = document.getElementById('calendar-event-hint');
        const deleteEventBtn = document.getElementById('delete-event-btn');

        function loadSelection() {
          try {
            return localStorage.getItem(STORAGE_KEY) || '';
          } catch {
            return '';
          }
        }

        function persistSelection() {
          try {
            if (selectedDate) localStorage.setItem(STORAGE_KEY, selectedDate);
            else localStorage.removeItem(STORAGE_KEY);
          } catch {}
        }

        function loadMarkedDates() {
          try {
            const raw = localStorage.getItem(MARKS_KEY);
            const parsed = raw ? JSON.parse(raw) : [];
            return new Set(Array.isArray(parsed) ? parsed : []);
          } catch {
            return new Set();
          }
        }

        function persistMarkedDates() {
          localStorage.setItem(MARKS_KEY, JSON.stringify([...markedDates]));
        }

        function loadEvents() {
          try {
            const raw = localStorage.getItem(EVENTS_KEY);
            const parsed = raw ? JSON.parse(raw) : {};
            return Object.entries(parsed || {}).reduce((acc, [iso, value]) => {
              if (!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return acc;
              const title = typeof value?.title === 'string' ? value.title.trim() : '';
              const notes = typeof value?.notes === 'string' ? value.notes.trim() : '';
              if (!title && !notes) return acc;
              acc[iso] = { title, notes };
              return acc;
            }, {});
          } catch {
            return {};
          }
        }

        function persistEvents() {
          localStorage.setItem(EVENTS_KEY, JSON.stringify(eventsByDate));
        }

        function formatDateLabel(iso) {
          if (!iso) return 'None';
          const date = new Date(`${iso}T00:00:00`);
          return date.toLocaleDateString('en-US', {
            weekday: 'short',
            month: 'short',
            day: 'numeric',
            year: 'numeric'
          });
        }

        function getSelectedEvent() {
          return selectedDate ? (eventsByDate[selectedDate] || { title: '', notes: '' }) : { title: '', notes: '' };
        }

        function renderTodayEvents() {
          const todayIso = isoToday();
          const todayEvent = eventsByDate[todayIso];
          const events = todayEvent && (todayEvent.title || todayEvent.notes) ? [todayEvent] : [];
          todayEventsCountEl.textContent = String(events.length);
          todayEventsEmptyEl.hidden = events.length > 0;
          todayEventsListEl.innerHTML = events.map(eventItem => `
            <div class="calendar-status__event">
              <div class="calendar-status__event-title">${escapeHtml(eventItem.title || 'Untitled event')}</div>
              ${eventItem.notes ? `<div class="calendar-status__event-note">${escapeHtml(eventItem.notes)}</div>` : ''}
            </div>
          `).join('');
        }

        function renderEventPanel() {
          eventPanelDateLabelEl.textContent = selectedDate ? `Event for ${formatDateLabel(selectedDate)}` : 'Add event for a date';
          if (!selectedDate) {
            eventTitleEl.value = '';
            eventNotesEl.value = '';
            eventTitleEl.disabled = true;
            eventNotesEl.disabled = true;
            deleteEventBtn.disabled = true;
            return;
          }

          const eventItem = getSelectedEvent();
          eventTitleEl.disabled = false;
          eventNotesEl.disabled = false;
          eventTitleEl.value = eventItem.title || '';
          eventNotesEl.value = eventItem.notes || '';
          deleteEventBtn.disabled = !(eventItem.title || eventItem.notes);
        }

        function getVisibleMonths() {
          if (viewMode === 'current') {
            if (year !== realYear) return [];
            return [realMonth];
          }

          if (viewMode === 'full') {
            return Array.from({ length: 12 }, (_, index) => index);
          }

          if (year < realYear) {
            return Array.from({ length: 12 }, (_, index) => index);
          }

          if (year === realYear) {
            return Array.from({ length: realMonth + 1 }, (_, index) => index);
          }

          return [];
        }

        function render() {
          const months = getVisibleMonths();
          yearLabel.textContent = String(year);
          selectionLabel.textContent = formatDateLabel(selectedDate);
          showPassedBtn.classList.toggle('is-active', viewMode === 'passed');
          showFullBtn.classList.toggle('is-active', viewMode === 'full');
          showCurrentBtn.classList.toggle('is-active', viewMode === 'current');
          clearSelectionBtn.classList.toggle('is-active', !!selectedDate);

          if (viewMode === 'full') {
            selectionCopy.textContent = 'Showing the full year.';
          } else if (viewMode === 'current') {
            selectionCopy.textContent = year === realYear
              ? 'Showing only the current month.'
              : 'Current month view is only available for the current year.';
          } else if (year < realYear) {
            selectionCopy.textContent = 'All months in this past year are visible.';
          } else if (year === realYear) {
            selectionCopy.textContent = 'Showing only months that have already passed or are current.';
          } else {
            selectionCopy.textContent = 'This is a future year. Click “Show full” to reveal all months.';
          }

          if (!months.length) {
            grid.innerHTML = '<div class="calendar-empty">No months are visible in this mode for the selected year. Try <strong>Show full</strong> or switch back to the current year.</div>';
            renderTodayEvents();
            renderEventPanel();
            return;
          }

          const weekdayMarkup = ['S', 'M', 'T', 'W', 'T', 'F', 'S']
            .map(day => `<span>${day}</span>`)
            .join('');

          grid.innerHTML = months.map(month => renderMonth(month, weekdayMarkup)).join('');
          renderTodayEvents();
          renderEventPanel();
        }

        function renderMonth(month, weekdayMarkup) {
          const monthName = new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long' });
          const firstWeekday = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const currentMonthCard = year === realYear && month === realMonth ? ' current-month' : '';

          let daysMarkup = '';
          for (let i = 0; i < firstWeekday; i += 1) {
            daysMarkup += '<span class="day-pad"></span>';
          }

          for (let day = 1; day <= daysInMonth; day += 1) {
            const iso = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const classes = ['day-btn'];
            if (iso === selectedDate) classes.push('selected');
            if (markedDates.has(iso)) classes.push('marked-x');
            if (eventsByDate[iso]) classes.push('has-event');
            if (iso === isoToday()) classes.push('today');
            daysMarkup += `<button class="${classes.join(' ')}" type="button" data-date="${iso}" aria-label="${iso}">${day}</button>`;
          }

          return `
            <section class="month-card${currentMonthCard}">
              <div class="month-card__name">${monthName}</div>
              <div class="month-card__hint">${year === realYear && month === realMonth ? 'Current month' : 'Month view'}</div>
              <div class="month-weekdays">${weekdayMarkup}</div>
              <div class="month-days">${daysMarkup}</div>
            </section>
          `;
        }

        function isoToday() {
          const y = today.getFullYear();
          const m = String(today.getMonth() + 1).padStart(2, '0');
          const d = String(today.getDate()).padStart(2, '0');
          return `${y}-${m}-${d}`;
        }

        document.getElementById('prev-year-btn').addEventListener('click', () => {
          year -= 1;
          render();
        });

        document.getElementById('next-year-btn').addEventListener('click', () => {
          year += 1;
          render();
        });

        showPassedBtn.addEventListener('click', () => {
          viewMode = 'passed';
          render();
        });

        showFullBtn.addEventListener('click', () => {
          viewMode = 'full';
          render();
        });

        showCurrentBtn.addEventListener('click', () => {
          viewMode = 'current';
          render();
        });

        clearSelectionBtn.addEventListener('click', () => {
          selectedDate = '';
          persistSelection();
          render();
        });

        eventFormEl.addEventListener('submit', event => {
          event.preventDefault();
          if (!selectedDate) return;
          const title = eventTitleEl.value.trim();
          const notes = eventNotesEl.value.trim();

          if (!title && !notes) {
            delete eventsByDate[selectedDate];
          } else {
            eventsByDate[selectedDate] = { title, notes };
          }

          persistEvents();
          render();
        });

        deleteEventBtn.addEventListener('click', () => {
          if (!selectedDate) return;
          delete eventsByDate[selectedDate];
          persistEvents();
          render();
        });

        grid.addEventListener('click', event => {
          const btn = event.target.closest('.day-btn');
          if (!btn) return;
          const iso = btn.dataset.date;

          if (pendingClickTimer) {
            clearTimeout(pendingClickTimer);
          }

          pendingClickTimer = window.setTimeout(() => {
            selectedDate = iso;
            persistSelection();
            render();
            pendingClickTimer = null;
          }, 220);
        });

        grid.addEventListener('dblclick', event => {
          const btn = event.target.closest('.day-btn');
          if (!btn) return;
          if (pendingClickTimer) {
            clearTimeout(pendingClickTimer);
            pendingClickTimer = null;
          }
          const iso = btn.dataset.date;
          if (markedDates.has(iso)) markedDates.delete(iso);
          else markedDates.add(iso);
          persistMarkedDates();
          render();
        });

        const todayEl = document.getElementById('today-label');
        if (todayEl) {
          todayEl.textContent = today.toLocaleDateString('en-US', {
            weekday: 'short',
            month: 'short',
            day: 'numeric'
          });
        }

        function escapeHtml(value) {
          const div = document.createElement('div');
          div.textContent = value;
          return div.innerHTML;
        }

        render();
      })();
    </script>
  </body>
</html>
